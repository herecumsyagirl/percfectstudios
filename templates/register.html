{% extends "base.html" %}
{% block title %}Create Account · PercfectStudios{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
  <div style="width:100%;max-width:420px;background:var(--bg-2);border:1px solid var(--border-2);border-radius:20px;padding:2rem;">

    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-size:1.75rem;font-weight:800;letter-spacing:-0.04em;margin-bottom:0.25rem;">Create your account</div>
      <div style="color:var(--text-muted);font-size:0.875rem;">Buy credits or redeem a coupon code to start generating.</div>
    </div>

    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input class="form-control" type="email" id="r-email" placeholder="you@example.com" autocomplete="email" />
      <div class="field-err" id="rerr-email"></div>
    </div>
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input class="form-control" id="r-username" placeholder="pick a username" autocomplete="username" />
      <div class="field-err" id="rerr-username"></div>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" id="r-password" placeholder="Min 8 chars, uppercase, number, symbol" autocomplete="new-password" />
      <div style="margin-top:0.4rem;display:flex;flex-wrap:wrap;gap:0.3rem;">
        <span class="pw-rule" id="rpr-len">8+ chars</span>
        <span class="pw-rule" id="rpr-upper">A–Z</span>
        <span class="pw-rule" id="rpr-num">0–9</span>
        <span class="pw-rule" id="rpr-sym">!@#...</span>
      </div>
      <div class="field-err" id="rerr-password"></div>
    </div>
    <div class="mb-3">
      <label class="form-label">Confirm Password</label>
      <input class="form-control" type="password" id="r-confirm" placeholder="Re-enter your password" autocomplete="new-password" />
      <div class="field-err" id="rerr-confirm"></div>
    </div>
    <div class="mb-4">
      <label class="form-label">Date of Birth <span style="color:var(--danger);font-size:0.75rem;">must be 18+</span></label>
      <input class="form-control" type="date" id="r-birthday" />
      <div class="field-err" id="rerr-birthday"></div>
    </div>

    <div id="r-error" class="alert alert-danger mb-3" style="display:none;font-size:0.85rem;"></div>

    <button onclick="submitRegister()" class="btn-accent w-100 py-2" id="r-btn"
      style="border-radius:10px;border:none;cursor:pointer;font-size:1rem;font-weight:600;">
      Create account →
    </button>

    <p style="text-align:center;margin-top:1rem;font-size:0.875rem;color:var(--text-muted);">
      Already have an account? <a href="/login" style="color:var(--accent)">Log in</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Password chips
  document.getElementById('r-password').addEventListener('input', function() {
    const v = this.value;
    const mark = (id, ok) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.background   = ok ? 'rgba(52,211,153,0.15)' : 'var(--bg-3)';
      el.style.borderColor  = ok ? 'rgba(52,211,153,0.4)'  : 'var(--border-2)';
      el.style.color        = ok ? 'var(--success)'         : 'var(--text-muted)';
    };
    mark('rpr-len',   v.length >= 8);
    mark('rpr-upper', /[A-Z]/.test(v));
    mark('rpr-num',   /[0-9]/.test(v));
    mark('rpr-sym',   /[^A-Za-z0-9]/.test(v));
  });

  // Clear error on input
  ['r-email','r-username','r-password','r-confirm','r-birthday'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => {
      const errEl = document.getElementById('rerr-' + id.replace('r-',''));
      if (errEl) { errEl.textContent = ''; errEl.style.display = 'none'; }
      el.style.borderColor = '';
    });
  });

  function rErr(id, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.style.display = msg ? '' : 'none';
  }
  function rShake(inputId) {
    const el = document.getElementById(inputId);
    if (!el) return;
    el.style.borderColor = 'var(--danger)';
    el.classList.add('shake');
    setTimeout(() => el.classList.remove('shake'), 500);
  }

  async function submitRegister() {
    const btn      = document.getElementById('r-btn');
    const email    = document.getElementById('r-email').value.trim();
    const username = document.getElementById('r-username').value.trim();
    const pw       = document.getElementById('r-password').value;
    const confirm  = document.getElementById('r-confirm').value;
    const dob      = document.getElementById('r-birthday').value;

    ['email','username','password','confirm','birthday'].forEach(f => rErr('rerr-'+f, ''));
    document.getElementById('r-error').style.display = 'none';

    let valid = true;
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { rErr('rerr-email','Enter a valid email address.'); rShake('r-email'); valid=false; }
    if (!username) { rErr('rerr-username','Username is required.'); rShake('r-username'); valid=false; }
    if (pw.length < 8 || !/[A-Z]/.test(pw) || !/[0-9]/.test(pw) || !/[^A-Za-z0-9]/.test(pw)) {
      rErr('rerr-password','Needs 8+ chars, uppercase, number, and symbol.'); rShake('r-password'); valid=false;
    } else if (pw !== confirm) {
      rErr('rerr-confirm','Passwords do not match.'); rShake('r-confirm'); valid=false;
    }
    if (!dob) { rErr('rerr-birthday','Date of birth is required.'); rShake('r-birthday'); valid=false; }
    else if ((Date.now() - new Date(dob)) / (365.25*24*3600*1000) < 18) {
      rErr('rerr-birthday','You must be 18 or older.'); rShake('r-birthday'); valid=false;
    }
    if (!valid) return;

    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, username, password: pw, birthday: dob })
      });
      const data = await res.json();
      if (!res.ok) {
        const msg = data.error || 'Something went wrong.';
        if (msg.toLowerCase().includes('email'))    { rErr('rerr-email', msg);    rShake('r-email'); }
        else if (msg.toLowerCase().includes('username')) { rErr('rerr-username', msg); rShake('r-username'); }
        else { document.getElementById('r-error').textContent = msg; document.getElementById('r-error').style.display = ''; }
        btn.disabled = false; btn.textContent = 'Create account →'; return;
      }
      window.location.href = '/percfectstudios';
    } catch(e) {
      document.getElementById('r-error').textContent = 'Network error. Please try again.';
      document.getElementById('r-error').style.display = '';
      btn.disabled = false; btn.textContent = 'Create account →';
    }
  }
</script>
{% endblock %}
