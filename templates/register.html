{% extends "base.html" %}
{% block title %}Create account · PercfectAI{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Create account</h2>
    <p class="auth-sub">Get 5 free image credits + 2 video credits</p>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" name="username" required autocomplete="username" />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" required autocomplete="new-password" />
      </div>
      <div class="mb-4">
        <label class="form-label">Birthday <span style="color:var(--text-muted)">(optional)</span></label>
        <input class="form-control" type="date" name="birthday" />
      </div>
      <button type="submit" class="btn btn-accent w-100 py-2">Create account</button>
    </form>
    <p class="text-center mt-3" style="font-size:0.875rem;color:var(--text-muted)">
      Already have an account? <a href="/login" style="color:var(--accent)">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
