{% extends "base.html" %}
{% block title %}Community Chatroom — PercfectStudios{% endblock %}

{% block content %}
<style>
  .cr-wrap { max-width: 820px; margin: 0 auto; padding: 1.25rem 1rem 2.5rem; }
  .cr-hero { text-align:center; margin-bottom:1rem; }
  .cr-hero h1 { font-size:1.7rem; font-weight:800; margin-bottom:.2rem; }
  .cr-hero p { color:var(--text-muted); font-size:.88rem; margin:0; }

  .cr-feed { background:var(--bg-2); border:1px solid var(--border-2); border-radius:16px;
    height:60vh; min-height:360px; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:.75rem; }
  .cr-msg { display:flex; flex-direction:column; gap:.2rem; max-width:80%; }
  .cr-msg.mine { align-self:flex-end; align-items:flex-end; }
  .cr-meta { font-size:.7rem; color:var(--text-muted); }
  .cr-bubble { background:var(--bg-3); border:1px solid var(--border); border-radius:14px; padding:.5rem .8rem; font-size:.9rem; word-break:break-word; }
  .cr-msg.mine .cr-bubble { background:var(--accent); color:#fff; border-color:var(--accent); }
  .cr-bubble.fight { background:linear-gradient(135deg,#3d1a6e,#1a0a3e); color:#fff; border:none; }
  .cr-bubble video { width:100%; max-width:320px; border-radius:10px; margin-top:.4rem; display:block; }
  .cr-empty { color:var(--text-muted); text-align:center; margin:auto; font-size:.85rem; }

  .cr-row { display:flex; gap:.5rem; margin-top:.75rem; }
  .cr-row input { flex:1; background:var(--bg-3); border:1px solid var(--border-2); color:var(--text);
    border-radius:12px; padding:.65rem .9rem; font-size:.9rem; }
  .cr-row input:focus { outline:none; border-color:var(--accent); }
  .cr-btn { border:none; border-radius:12px; padding:.65rem 1.1rem; font-weight:700; cursor:pointer; font-size:.9rem; }
  .cr-send { background:var(--accent); color:#fff; }
  .cr-fight { background:linear-gradient(135deg,#a855f7,#7c3aed); color:#fff; width:100%; margin-top:.5rem; padding:.7rem; }
  .cr-btn:disabled { opacity:.6; cursor:not-allowed; }

  .cr-picker { background:var(--bg-2); border:1px solid var(--border-2); border-radius:14px; padding:1rem; margin-top:.75rem; }
  .cr-picker-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:.5rem; margin:.6rem 0; }
  .cr-pick { border:2px solid transparent; border-radius:10px; overflow:hidden; cursor:pointer; aspect-ratio:1; background:var(--bg-3); position:relative; }
  .cr-pick img { width:100%; height:100%; object-fit:cover; }
  .cr-pick.sel { border-color:var(--accent); }
  .cr-pick .num { position:absolute; top:3px; left:3px; background:var(--accent); color:#fff; font-size:.65rem; font-weight:700; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; }
  .cr-err { color:#f87171; font-size:.8rem; margin-top:.4rem; display:none; }
</style>

<div class="cr-wrap">
  <div class="cr-hero">
    <h1>💬 The Lounge</h1>
    <p>Hang out with other creators — and throw your characters into the ring.</p>
  </div>

  <div class="cr-feed" id="cr-feed"><div class="cr-empty" id="cr-empty">No messages yet — say hi 👋</div></div>

  <div class="cr-row">
    <input id="cr-input" maxlength="500" placeholder="Type a message…" onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="cr-btn cr-send" id="cr-send-btn" onclick="sendMsg()">Send</button>
  </div>
  <button class="cr-btn cr-fight" onclick="toggleFight()">⚔️ Post a character fight</button>

  <div class="cr-picker" id="cr-picker" style="display:none">
    <p style="font-weight:700;margin:0">Pick 2 of your characters to fight <span style="font-weight:400;color:var(--text-muted);font-size:.8rem">(6 video seconds)</span></p>
    <div class="cr-picker-grid" id="cr-pick-grid"></div>
    <button class="cr-btn cr-fight" id="cr-fight-go" onclick="postFight()">⚔️ Generate &amp; post fight</button>
    <div class="cr-err" id="cr-fight-err"></div>
  </div>
</div>

<script>
const LOGGED_IN = {{ 'true' if user else 'false' }};
let lastId = 0, pickSel = [], rosterCache = [];

function esc(s){ return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function renderMsgs(msgs){
  if(!msgs.length) return;
  const feed = document.getElementById('cr-feed');
  const empty = document.getElementById('cr-empty'); if(empty) empty.remove();
  const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80;
  msgs.forEach(m=>{
    if(m.id<=lastId) return; lastId = m.id;
    const div = document.createElement('div'); div.className = 'cr-msg';
    const media = (m.type==='fight' && m.media_url) ? `<video src="${esc(m.media_url)}" controls loop muted playsinline></video>` : '';
    div.innerHTML = `<div class="cr-meta">${esc(m.username||'anon')}</div>
      <div class="cr-bubble ${m.type==='fight'?'fight':''}">${esc(m.body||'')}${media}</div>`;
    feed.appendChild(div);
  });
  if(atBottom) feed.scrollTop = feed.scrollHeight;
}

async function poll(){
  try{
    const res = await fetch('/studios/chatroom/messages?after='+lastId);
    const msgs = await res.json();
    renderMsgs(msgs);
  }catch(e){}
}

async function sendMsg(){
  if(!LOGGED_IN){ if(window.openAuthModal) openAuthModal('signup'); return; }
  const input = document.getElementById('cr-input');
  const body = input.value.trim(); if(!body) return;
  input.value=''; const btn=document.getElementById('cr-send-btn'); btn.disabled=true;
  try{
    const fd=new FormData(); fd.append('body',body);
    const res=await fetch('/studios/chatroom/send',{method:'POST',body:fd});
    const m=await res.json();
    if(res.ok) renderMsgs([m]);
  }catch(e){} finally{ btn.disabled=false; input.focus(); }
}

async function toggleFight(){
  if(!LOGGED_IN){ if(window.openAuthModal) openAuthModal('signup'); return; }
  const p=document.getElementById('cr-picker');
  if(p.style.display==='none'){ p.style.display='block'; await loadRosterPicker(); }
  else p.style.display='none';
}

async function loadRosterPicker(){
  const grid=document.getElementById('cr-pick-grid');
  grid.innerHTML='<p style="color:var(--text-muted);font-size:.8rem">Loading your characters…</p>';
  try{
    const res=await fetch('/studios/percfectcharacter/characters');
    const data=await res.json();
    rosterCache=data.characters||[]; pickSel=[];
    if(!rosterCache.length){ grid.innerHTML='<p style="color:var(--text-muted);font-size:.8rem">No characters yet — build some first.</p>'; return; }
    grid.innerHTML=rosterCache.map(c=>`<div class="cr-pick" id="cp-${c.id}" onclick="togglePick(${c.id})"><img src="${esc(c.primary_image_url)}" alt=""><span class="num" id="cn-${c.id}" style="display:none"></span></div>`).join('');
  }catch(e){ grid.innerHTML='<p class="cr-err" style="display:block">Could not load characters.</p>'; }
}

function togglePick(id){
  const i=pickSel.indexOf(id);
  if(i>=0) pickSel.splice(i,1);
  else { if(pickSel.length>=2) pickSel.shift(); pickSel.push(id); }
  rosterCache.forEach(c=>{
    const el=document.getElementById('cp-'+c.id), num=document.getElementById('cn-'+c.id);
    const pos=pickSel.indexOf(c.id);
    el.classList.toggle('sel',pos>=0);
    if(num){ num.style.display=pos>=0?'flex':'none'; num.textContent=pos+1; }
  });
}

async function postFight(){
  const err=document.getElementById('cr-fight-err'); err.style.display='none';
  if(pickSel.length!==2){ err.textContent='Pick exactly 2 characters.'; err.style.display='block'; return; }
  const btn=document.getElementById('cr-fight-go'); btn.disabled=true; btn.textContent='⚔️ Generating… (~60s)';
  try{
    const fd=new FormData(); fd.append('character_ids',pickSel.join(','));
    const res=await fetch('/studios/chatroom/fight',{method:'POST',body:fd});
    const m=await res.json();
    if(!res.ok){ err.textContent=m.error||'Fight failed.'; err.style.display='block'; return; }
    renderMsgs([m]);
    document.getElementById('cr-picker').style.display='none';
    const vc=document.getElementById('vid-credits'); if(vc){ const n=parseInt(vc.textContent); if(!isNaN(n)) vc.textContent=Math.max(0,n-6); }
  }catch(e){ err.textContent='Network error — please try again.'; err.style.display='block'; }
  finally{ btn.disabled=false; btn.textContent='⚔️ Generate & post fight'; }
}

poll();
setInterval(poll, 3500);
</script>
{% endblock %}
