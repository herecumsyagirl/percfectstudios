services:
  - type: web
    name: percfectstudios
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 200
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: XAI_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_CREATOR
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
